LANGKAH-LANGKAH PEMASANGAN:

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

BAGIAN A: TAMBAHKAN CSS GLOBAL KE TEMA BLOGGER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
1. Login ke Blogger → pilih Blog kamu
2. Klik "Tema" di menu sidebar
3. Klik tombol "Edit HTML"
4. Cari tag </head> di kode tema
5. Paste kode CSS dari GLOBAL_CSS.html tepat sebelum </head>
6. Klik "Simpan tema"

BAGIAN B: BUAT HALAMAN-HALAMAN
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Untuk setiap halaman (Beranda, Tentang, Program, Ajak Teman, Pendaftaran):
1. Klik "Halaman" di menu sidebar Blogger
2. Klik "Halaman Baru"
3. Di editor halaman, klik ikon "</>" (Edit HTML)
4. Paste isi file HTML yang sesuai
5. Isi "Judul Halaman" sesuai nama halaman
6. Klik "Simpan" atau "Publish"

BAGIAN C: BUAT MENU NAVIGASI
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Setelah semua halaman dibuat:
1. Klik "Tata Letak" di menu sidebar
2. Tambahkan widget "Daftar Halaman" atau "Menu" 
3. Atur urutan halaman: Beranda | Tentang | Program | Ajak Teman | Daftar

PEMETAAN FILE → HALAMAN BLOGGER:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
File                  → Judul Halaman Blogger
BERANDA.html          → Beranda (jadikan halaman Beranda/Homepage)
TENTANG.html          → Tentang Kami
PROGRAM.html          → Program Unggulan
AJAK_TEMAN.html       → Ajak Teman, Dapat Cuan!
PENDAFTARAN.html      → Daftar Sekarang

CATATAN URL INTERNAL:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
File HTML ini menggunakan URL:
  /p/pendaftaran.html  → URL halaman Pendaftaran di Blogger
  /p/program.html      → URL halaman Program di Blogger

Setelah publish, ganti URL tersebut dengan URL asli dari halaman
yang kamu buat di Blogger. Contoh:
  https://widyautbk.blogspot.com/p/daftar-sekarang.html
